<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SFC Hub Locator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/map.css">
  <link rel="stylesheet" href="css/popup.css">
  <link rel="stylesheet" href="css/search.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/support.css">
</head>
<body>
  <div id="loadingScreen" class="loading-screen">
    <div class="loading-box">
      <img src="assets/images/steadfast-logo.png" alt="Steadfast Logo" class="loading-logo">
      <div class="loading-text">Loading hub data, please wait...</div>
      <div class="loading-spinner"></div>
    </div>
  </div>

  <div class="app-shell">
    <div class="top-header">
      <div class="brand-wrap">
        <img src="assets/images/steadfast-logo.png" class="brand-logo-img" alt="Steadfast Logo">
      </div>
      <div class="header-time" id="liveDateTime">Loading time...</div>
      <div class="header-search">
        <input id="searchBox" type="text" placeholder="Search Hub / Division / District / Police Station" autocomplete="off">
        <span class="search-icon">⌕</span>
        <div id="searchSuggestions" class="search-suggestions hidden"></div>
      </div>
    </div>

    <div class="layout">
      <div class="sidebar" id="sidebar">
        <div class="sidebar-topbar">
          <div class="sidebar-title-wrap">
            <div class="sidebar-title">Navigation</div>
            <div class="sidebar-subtitle">Hub discovery panel</div>
          </div>
          <button id="sidebarToggleBtn" class="sidebar-toggle-btn">☰</button>
        </div>

        <div class="sidebar-icon-rail">
          <button class="rail-btn" data-rail-action="clear" title="Clear Filters">
            <img src="assets/images/clear-filter.png" class="rail-icon" alt="Clear Filters">
          </button>

          <button class="rail-btn" data-rail-target="quickAccessPanel" title="Quick Access">
            <img src="assets/images/quick-access.png" class="rail-icon" alt="Quick Access">
          </button>

          <button class="rail-btn" data-rail-target="divisionTree" title="Divisions">
            <img src="assets/images/division.png" class="rail-icon" alt="Divisions">
            <span class="rail-badge" id="divisionRailCount">0</span>
          </button>

          <button class="rail-btn" data-rail-target="districtTree" title="Districts">
            <img src="assets/images/district.png" class="rail-icon" alt="Districts">
            <span class="rail-badge" id="districtRailCount">0</span>
          </button>

          <button class="rail-btn" data-rail-target="policeStationTree" title="Police Stations">
            <img src="assets/images/zone.png" class="rail-icon" alt="Police Stations">
            <span class="rail-badge" id="policeStationRailCount">0</span>
          </button>

          <button class="rail-btn" data-rail-target="hubTree" title="Hubs">
            <img src="assets/images/Hubs.png" class="rail-icon" alt="Hubs">
            <span class="rail-badge" id="hubRailCount">0</span>
          </button>
        </div>

        <div class="sidebar-body">
          <div class="sidebar-actions">
            <button id="clearFiltersBtn" class="clear-filters-btn">Clear Filters</button>
          </div>

          <div class="sidebar-scroll-area">
            <div class="sidebar-panel quick-access-panel" id="quickAccessPanel">
              <button class="sidebar-panel-toggle" type="button" data-panel-target="quickAccessContent">
                <span class="sidebar-panel-title">Quick Access</span>
                <span class="sidebar-panel-toggle-icon" id="quickAccessToggleIcon">+</span>
              </button>

              <div id="quickAccessContent" class="sidebar-panel-content hidden">
                <div class="quick-access-grid">
                  <div class="quick-card">
                    <div class="quick-card-label">Selected Hub</div>
                    <div class="quick-card-value" id="selectedHubLabel">None selected</div>
                  </div>

                  <div class="quick-card">
                    <div class="quick-card-label">Favorites</div>
                    <div class="quick-card-value" id="favoriteHubCount">0 hubs</div>
                  </div>

                  <div class="quick-card">
                    <div class="quick-card-label">Recently Viewed</div>
                    <div class="quick-card-value" id="recentHubCount">0 hubs</div>
                  </div>
                </div>

                <div class="quick-list-block">
                  <div class="quick-list-title">Favorites</div>
                  <div id="favoriteHubList" class="quick-list">
                    <div class="quick-empty">No favorite hubs yet</div>
                  </div>
                </div>

                <div class="quick-list-block">
                  <div class="quick-list-title">Recently Viewed</div>
                  <div id="recentHubList" class="quick-list">
                    <div class="quick-empty">No recent hubs yet</div>
                  </div>
                </div>
              </div>
            </div>

            <div class="sidebar-panel filter-panel">
              <div class="filter-panel-header">
                <div class="sidebar-panel-title">Hub Filters</div>

                <div class="filter-toolbar">
                  <button id="expandAllBtn" class="filter-toolbar-btn" type="button" aria-label="Expand All" title="Expand All">+</button>
                  <button id="collapseAllBtn" class="filter-toolbar-btn" type="button" aria-label="Collapse All" title="Collapse All">−</button>
                </div>
              </div>

              <div class="tree-wrap">
                <div class="tree-section">
                  <button class="tree-toggle tree-box" data-target="divisionTree">
                    <span class="tree-box-label">Divisions</span>
                    <span class="tree-box-count" id="divisionTreeCount">0</span>
                  </button>
                  <div id="divisionTree" class="tree-list hidden"></div>
                </div>

                <div class="tree-section">
                  <button class="tree-toggle tree-box" data-target="districtTree">
                    <span class="tree-box-label">Districts</span>
                    <span class="tree-box-count" id="districtTreeCount">0</span>
                  </button>
                  <div id="districtTree" class="tree-list hidden"></div>
                </div>

                <div class="tree-section">
                  <button class="tree-toggle tree-box" data-target="policeStationTree">
                    <span class="tree-box-label">Police Stations</span>
                    <span class="tree-box-count" id="policeStationTreeCount">0</span>
                  </button>
                  <div id="policeStationTree" class="tree-list hidden"></div>
                </div>

                <div class="tree-section">
                  <button class="tree-toggle tree-box" data-target="hubTree">
                    <span class="tree-box-label">Hubs</span>
                    <span class="tree-box-count" id="hubTreeCount">0</span>
                  </button>
                  <div id="hubTree" class="tree-list hidden"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div><!-- /.sidebar -->

      <div class="map-panel">
        <div class="map-tools">
          <button id="resetMapBtn" class="map-tool-btn">Reset Map</button>
          <button id="myLocationBtn" class="map-tool-btn">My Location</button>
          <button id="nearestHubBtn" class="map-tool-btn">Nearest Hub</button>
          <button id="heatmapToggleBtn" class="map-tool-btn">Heatmap</button>
        </div>

        <div id="markerHoverCard" class="marker-hover-card hidden"></div>
        <div id="mapToast" class="map-toast hidden"></div>

        <div id="map"></div>

        <div id="mapOverlay" class="map-overlay hidden"></div>

        <div id="hubDetailsPanel" class="hub-details-panel hidden">
          <button id="hubDetailsClose" class="hub-details-close">×</button>
          <div id="hubDetailsContent"></div>
        </div>
      </div><!-- /.map-panel -->
    </div><!-- /.layout -->
  </div><!-- /.app-shell -->
  <div class="section-title">Hub Details</div>
  <div class="section-title">Contact Details</div>

  <a
    href="https://chat.whatsapp.com/GYuhJ6h3IZd5rHN2rVhn6o"
    class="whatsapp-support-btn"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Urgent WhatsApp Support"
    title="Urgent WhatsApp Support"
  >
    <svg viewBox="0 0 32 32" aria-hidden="true" class="whatsapp-support-icon">
      <path fill="currentColor" d="M19.11 17.44c-.29-.15-1.72-.85-1.98-.95-.26-.09-.45-.14-.64.15-.19.29-.74.95-.91 1.15-.17.19-.33.22-.62.07-.29-.15-1.22-.45-2.32-1.43-.86-.77-1.44-1.73-1.61-2.02-.17-.29-.02-.45.13-.6.13-.13.29-.33.43-.5.14-.17.19-.29.29-.48.09-.19.05-.36-.02-.5-.07-.14-.64-1.55-.88-2.12-.23-.55-.47-.48-.64-.49h-.55c-.19 0-.5.07-.76.36-.26.29-.99.97-.99 2.36s1.02 2.73 1.16 2.92c.14.19 2 3.05 4.84 4.27.68.29 1.21.47 1.63.6.69.22 1.31.19 1.8.12.55-.08 1.72-.7 1.96-1.37.24-.67.24-1.24.17-1.36-.07-.12-.26-.19-.55-.33Z"/>
      <path fill="currentColor" d="M16.02 3.2c-6.97 0-12.62 5.65-12.62 12.62 0 2.23.58 4.41 1.68 6.33L3.2 28.8l6.82-1.79a12.57 12.57 0 0 0 5.99 1.52h.01c6.97 0 12.62-5.65 12.62-12.62S22.99 3.2 16.02 3.2Zm0 22.98h-.01a10.3 10.3 0 0 1-5.26-1.44l-.38-.22-4.05 1.06 1.08-3.95-.25-.4a10.28 10.28 0 0 1-1.58-5.46c0-5.68 4.62-10.3 10.31-10.3 2.75 0 5.34 1.07 7.29 3.02a10.24 10.24 0 0 1 3.02 7.28c0 5.68-4.62 10.31-10.3 10.31Z"/>
    </svg>
    <span class="whatsapp-support-label">Support</span>
  </a>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/map.js"></script>
  <script src="js/heatmap.js"></script>
  <script src="js/mapLayers.js"></script>
  <script src="js/popup.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/search.js"></script>
  <script src="js/sheet.js"></script>
  <script src="js/counts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
