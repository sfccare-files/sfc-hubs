<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>SFC Hub Locator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/map.css">
  <link rel="stylesheet" href="css/popup.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

  <div id="loadingScreen" class="loading-screen">
    <div class="loading-box">
      <img src="assets/images/steadfast-logo.png" alt="SteadFast Courier" class="loading-logo">
      <div class="loading-text">Loading Hub Data...</div>
      <div class="loading-spinner"></div>
    </div>
  </div>

  <div class="app-shell">
    <div class="top-header">
      <div class="brand-wrap">
        <img src="assets/images/steadfast-logo.png" alt="SteadFast Courier" class="brand-logo-img">
      </div>

      <div class="header-time" id="liveDateTime">Loading time...</div>

      <div class="header-search">
        <input id="searchBox" type="text" placeholder="Search Hub" autocomplete="off">
        <span class="search-icon">⌕</span>
      </div>
    </div>

    <div class="layout">
      <div class="sidebar" id="sidebar">
        <div class="sidebar-topbar">
          <div class="sidebar-title">Hubs List</div>
          <button id="sidebarToggleBtn" class="sidebar-toggle-btn" type="button" aria-label="Toggle sidebar">
            ☰
          </button>
        </div>

        <div class="sidebar-icon-rail">
          <button class="rail-btn" type="button" data-rail-action="clear" title="Clear Filters">
            <img src="assets/images/clear-filter.png" alt="Clear Filters" class="rail-icon">
          </button>

          <button class="rail-btn" type="button" data-rail-target="divisionTree" title="Divisions">
            <img src="assets/images/division.png" alt="Divisions" class="rail-icon">
          </button>

          <button class="rail-btn" type="button" data-rail-target="districtTree" title="Districts">
            <img src="assets/images/district.png" alt="Districts" class="rail-icon">
          </button>

          <button class="rail-btn" type="button" data-rail-target="zoneTree" title="Zones">
            <img src="assets/images/zone.png" alt="Zones" class="rail-icon">
          </button>

          <button class="rail-btn" type="button" data-rail-target="hubTree" title="Hubs">
            <img src="assets/images/Hubs.png" alt="Hubs" class="rail-icon">
          </button>
        </div>

        <div class="sidebar-body">
          <div class="sidebar-actions">
            <button id="clearFiltersBtn" class="clear-filters-btn" type="button">
              Clear Filters
            </button>
          </div>

          <div class="tree-wrap">
            <div class="tree-section">
              <button class="tree-toggle tree-box" type="button" data-target="divisionTree">
                <span>Divisions</span>
              </button>
              <div id="divisionTree" class="tree-list hidden"></div>
            </div>

            <div class="tree-section">
              <button class="tree-toggle tree-box" type="button" data-target="districtTree">
                <span>Districts</span>
              </button>
              <div id="districtTree" class="tree-list hidden"></div>
            </div>

            <div class="tree-section">
              <button class="tree-toggle tree-box" type="button" data-target="zoneTree">
                <span>Zones</span>
              </button>
              <div id="zoneTree" class="tree-list hidden"></div>
            </div>

            <div class="tree-section">
              <button class="tree-toggle tree-box" type="button" data-target="hubTree">
                <span>Hubs</span>
              </button>
              <div id="hubTree" class="tree-list hidden"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="map-panel">
        <div class="stats-bar">
          <div class="stat-card">
            <div class="stat-label">Total Hubs</div>
            <div class="stat-value" id="totalHubsCount">0</div>
          </div>

          <div class="stat-card">
            <div class="stat-label">Visible Hubs</div>
            <div class="stat-value" id="visibleHubsCount">0</div>
          </div>

          <div class="stat-card">
            <div class="stat-label">Divisions</div>
            <div class="stat-value" id="divisionCount">0</div>
          </div>

          <div class="stat-card">
            <div class="stat-label">Districts</div>
            <div class="stat-value" id="districtCount">0</div>
          </div>

          <div class="stat-card">
            <div class="stat-label">Zones</div>
            <div class="stat-value" id="zoneCount">0</div>
          </div>
        </div>

        <div id="map"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <script src="js/map.js"></script>
  <script src="js/popup.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/search.js"></script>
  <script src="js/sheet.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
